services:
  api:
    build:
      context: ./api
    networks:
      - app-network
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
  
  db:
    image: postgres:15
    networks:
      - app-network
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bugtracker"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge