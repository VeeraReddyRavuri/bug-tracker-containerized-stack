services:

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    networks:
      - app-network
    depends_on:
      - db
    env_file:
      - ../.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
  
  db:
    image: postgres:latest
    networks:
      - app-network
    env_file:
      - ../.env
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=appdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
  
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    depends_on:
      - api
    
networks:
  app-network:
    driver: bridge
  
volumes:
  postgres-data